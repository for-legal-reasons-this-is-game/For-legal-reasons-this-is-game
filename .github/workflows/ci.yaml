name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile:
    name: compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, tradingengine] 
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - name: cargo build
        working-directory: ${{ matrix.dir }}
        run: nix develop --command cargo build --locked --all-targets

  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, tradingengine]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - name: cargo test
        working-directory: ${{ matrix.dir }}
        run: nix develop --command cargo test --locked

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, tradingengine]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - name: cargo clippy
        working-directory: ${{ matrix.dir }}
        run: nix develop --command cargo clippy --locked --all-targets -- -D warnings
