name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # used by magic-nix-cache

jobs:
  compile:
    name: compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, tradingengine]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo build
        run: nix develop --command cargo build --locked --all-targets

  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, tradingengine]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo test
        run: nix develop --command cargo test --locked

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, tradingengine]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo clippy
        run: nix develop --command cargo clippy --locked --all-targets -- -D warnings
